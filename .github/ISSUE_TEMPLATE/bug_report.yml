name: Bug Report
description: Report a bug or unexpected behavior in Ooplix
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out this form as completely as possible.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest version of Ooplix
          required: true
        - label: I have read the [FAQ](../../docs/faq/FAQ.md)
          required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to Mission Control
        2. Click 'New Mission'
        3. Enter '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant log output (PM2 logs, browser console, etc.)
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (data loss / security / crashes on startup)
        - High (core feature broken)
        - Medium (feature degraded, workaround exists)
        - Low (cosmetic / minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Mission Control / AI Runtime
        - CRM / Business OS
        - Developer Workspace (editor / git / terminal)
        - Growth OS (email / SMS / WhatsApp)
        - Billing / Payments
        - Authentication / Security
        - Launch Platform
        - Electron desktop app
        - Backend API
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Ooplix version
      placeholder: "3.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - VPS (Ubuntu)
        - Other
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "20.x"
