name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check if this has already been requested in [Discussions](../../discussions) or [existing issues](../../issues).

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and discussions for this feature
          required: true
        - label: This feature fits within Ooplix's scope (AI operating system for solo founders)
          required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What can you NOT do today?
      placeholder: As a founder, I struggle to... because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. What would it look like and how would it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other solutions have you tried or considered?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Mission Control / AI Runtime
        - CRM / Business OS
        - Developer Workspace
        - Growth OS
        - Billing / Payments
        - Launch Platform
        - Monitoring / Observability
        - Mobile app
        - API / Integrations
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical — blocking my workflow
        - High — would significantly improve my workflow
        - Medium — nice to have
        - Low — minor improvement

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar products, or any other context.
