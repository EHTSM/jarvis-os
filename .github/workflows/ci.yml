name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & security audit ────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend deps
        run: npm ci --omit=dev

      - name: npm audit (backend)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── 2. Backend regression ───────────────────────────────────────────────────
  regression:
    name: Regression Suite (144 checks)
    runs-on: ubuntu-latest
    needs: audit

    env:
      NODE_ENV: test
      PORT: 5050
      JWT_SECRET: ci-test-secret-32-bytes-minimum-len
      OPERATOR_PASSWORD_HASH: ${{ secrets.CI_OPERATOR_HASH }}
      BASE_URL: http://localhost:5050
      GROQ_API_KEY: ${{ secrets.CI_GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Create required directories
        run: mkdir -p data logs backups

      - name: Start backend server
        run: |
          node backend/server.js &
          echo $! > /tmp/server.pid
          # Wait up to 15s for server to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:5050/health > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:5050/health || (echo "Server failed to start" && exit 1)

      - name: Run regression suite
        run: npm run test:runtime

      - name: Verify 144/144 pass
        run: |
          RESULT=$(npm run test:runtime 2>&1)
          echo "$RESULT"
          echo "$RESULT" | grep -E "pass 144" || (echo "::error::Regression suite did not pass 144/144" && exit 1)

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true

  # ── 3. Frontend build ───────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: audit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build:frontend
        env:
          REACT_APP_API_URL: ""
          CI: false

      - name: Verify build output
        run: |
          test -f frontend/build/index.html || (echo "::error::Build did not produce index.html" && exit 1)
          test -d frontend/build/static || (echo "::error::Build missing static assets" && exit 1)
          echo "Build size: $(du -sh frontend/build | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/build/
          retention-days: 7

  # ── 4. Deploy script verification ───────────────────────────────────────────
  # rollback.sh/update.sh/etc had zero automated verification — a broken
  # rollback script would only be discovered during an actual incident.
  # shellcheck is preinstalled on ubuntu-latest; no new dependency added.
  deploy-scripts:
    name: Deploy Script Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check all deploy scripts
        run: |
          fail=0
          for f in deploy/*.sh; do
            bash -n "$f" || { echo "::error file=$f::syntax error"; fail=1; }
          done
          exit $fail

      - name: Shellcheck deploy scripts (warnings only, not blocking)
        run: shellcheck -S warning deploy/*.sh || true

  # ── 5. Production validation ────────────────────────────────────────────────
  validate:
    name: Production Validation
    runs-on: ubuntu-latest
    needs: [regression, build-frontend]

    env:
      NODE_ENV: production
      PORT: 5050
      JWT_SECRET: ci-test-secret-32-bytes-minimum-len
      OPERATOR_PASSWORD_HASH: ${{ secrets.CI_OPERATOR_HASH }}
      BASE_URL: http://localhost:5050
      GROQ_API_KEY: ${{ secrets.CI_GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create required directories
        run: mkdir -p data logs backups

      - name: Start server
        run: |
          node backend/server.js &
          echo $! > /tmp/server.pid
          for i in $(seq 1 15); do
            curl -sf http://localhost:5050/health > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run production validation (warn-only in CI)
        run: bash deploy/validate-production.sh || true

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true

  # ── 6. Status summary ───────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [regression, build-frontend, deploy-scripts, validate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.regression.result }}" != "success" ]]; then
            echo "::error::Regression suite failed"
            exit 1
          fi
          if [[ "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "::error::Frontend build failed"
            exit 1
          fi
          if [[ "${{ needs.deploy-scripts.result }}" != "success" ]]; then
            echo "::error::Deploy script syntax check failed"
            exit 1
          fi
          echo "All CI checks passed."
