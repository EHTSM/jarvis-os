# JARVIS OS — Nginx config
# Place at: /etc/nginx/sites-available/jarvis
# Enable:   ln -s /etc/nginx/sites-available/jarvis /etc/nginx/sites-enabled/jarvis
# Test:     nginx -t && systemctl reload nginx
#
# BEFORE ENABLING:
#   1. Replace yourdomain.com with your real domain (or run https-setup.sh)
#   2. Set STATIC_ROOT to your actual app directory + /frontend/build
#      e.g. /var/www/jarvis/frontend/build  OR  /opt/jarvis-os/frontend/build
#   3. Run https-setup.sh to obtain SSL cert and uncomment the ssl_* lines

# Rate limiting — 30 req/s per IP, burst 60
limit_req_zone $binary_remote_addr zone=jarvis_limit:10m rate=30r/s;

# Upstream — single backend on port 5050
upstream jarvis_backend {
    server 127.0.0.1:5050;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — Certbot populates these automatically via https-setup.sh
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    # HSTS: 1 year + subdomains. Only set on HTTPS (this block is HTTPS only).
    # Remove includeSubDomains if other subdomains don't use HTTPS yet.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Firebase Auth + GTM + GA4 + Clarity (all external domains loaded by index.html)
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://www.googleapis.com https://www.google.com https://www.recaptcha.net https://www.googletagmanager.com https://www.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://www.googletagmanager.com https://www.clarity.ms; frame-src https://ooplix-jarvis.firebaseapp.com https://www.google.com https://www.recaptcha.net https://www.googletagmanager.com; frame-ancestors 'none';" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;
    client_max_body_size 10m;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/html application/json application/javascript
               text/css application/xml text/javascript;
    gzip_min_length 1000;

    # ── Frontend static files — served directly by nginx (no Node.js) ─────
    # UPDATE THIS PATH to match your VPS app directory:
    #   /var/www/jarvis/frontend/build   (if app is in /var/www/jarvis)
    #   /opt/jarvis-os/frontend/build    (if app is in /opt/jarvis-os)
    root /opt/jarvis-os/frontend/build;

    # Hashed JS/CSS bundles — cache forever (CRA appends content hash to filenames)
    location ~* ^/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static assets (favicon, manifest, etc.)
    location ~* \.(ico|png|jpg|svg|woff2?|ttf|eot|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Webhooks — no rate limit (Razorpay + Meta require direct access) ──
    location ~ ^/(webhook|whatsapp/webhook) {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SSE event stream — MUST have buffering disabled or events never arrive ──
    # proxy_read_timeout must exceed the SSE heartbeat interval (20s ping).
    # X-Accel-Buffering: no is also set by Express but nginx must agree.
    location /runtime/stream {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Cookie must be forwarded — /runtime/stream is auth-gated (requireAuth reads the httpOnly cookie)
        proxy_set_header   Cookie            $http_cookie;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Runtime API routes — auth gated, rate limited ────────────────────
    location ^~ /runtime {
        limit_req zone=jarvis_limit burst=20 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Auth routes (bare and /api/-prefixed) ─────────────────────────────
    location ^~ /auth {
        limit_req zone=jarvis_limit burst=5 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /api/* prefix — proxy all to Express (strips nothing; Express handles /api/ mount) ──
    location ^~ /api {
        limit_req zone=jarvis_limit burst=20 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All API routes — catch-all proxy to Express, rate limited ────────
    # Excludes /static/ (handled above) and falls through to React SPA (/).
    # This single block replaces the old enumerated-prefix regex and covers
    # all POST-Ω routes: /rc1-rc4, /org-network, /infra, /science, /business,
    # /knowledge, /evolution, /odi, /engineering, /customer-org, /workforce-os,
    # /workspace-mesh, /research, /company-factory, /auto-market, /investment,
    # /physical, /twin, /computer, /approval, /execution, /coding, /alpha,
    # /cbeta, /beta, /fdios, and every other Express-mounted prefix.
    location ~ ^/(health|ops|stats|jarvis|auth|billing|accounts|settings|crm|ai|tasks|payment|browser|oauth|telegram|whatsapp|webhook|runtime|simulation|evolution|metrics|search|deploy|secrets|obs|send-followup|agents|missions?|organizations?|workspaces?|plugins|extensions|commercial|marketplace|analytics|launch|growth|admin|security|graph|governance|pipeline|distribution|workforce|automation|coding|engineering|business|knowledge|odi|twin|computer|approval|execution|alpha|cbeta|beta|fdios|rc[0-9]+|org-network|infra|science|research|investment|physical|customer-org|workforce-os|workspace-mesh|company-factory|auto-market|product-factory|revenue-engine|knowledge-net|collab|eco|civ|auto|platform|ent|eos|aeo|ako|p[0-9]+|phase[0-9]+|founderAutomation|founderJournal|founderVault|founderIdentityOS|founderTwin|op1|co[0-9]|dop[0-9]|pcs|oai-x|obi-x|okb-x|ose-x|repositoryViz|selfImprovement|codingBundle|codingDecisions|lifecycle|composer|productionInfra|productionWiring|postOmega|launchPlatform|revenueOS|autonomousPlatform|autonomousRevenue|autonomousInvestment|autonomousMarketplace|autonomousEvolutionOrg|autonomousKnowledgeOrg|autonomousOrg|civilizationOrg|ecosystemOrg|enterpriseOrg|executiveOrg|globalInfrastructure|knowledgeNetwork|organizationNetwork|scientificDiscovery|physicalWorld|workspaceMesh|researchInstitute|companyFactory|productFactory|customerOrg|workforceOS|approvalRoutes|computerController|betaReadiness|closedBeta|alphaProgram|platformOrg|businessOrg|engineeringOrg|engineeringMemory|pcs2ExternalPlatforms|pcsCredentials) {
        limit_req zone=jarvis_limit burst=20 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA — try file on disk first, fall back to index.html ──────
    # This handles client-side routing (React Router / hash routes).
    location / {
        limit_req zone=jarvis_limit burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
