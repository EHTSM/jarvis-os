# JARVIS OS — Nginx reverse proxy config
# Place at: /etc/nginx/sites-available/jarvis
# Enable:   ln -s /etc/nginx/sites-available/jarvis /etc/nginx/sites-enabled/jarvis
# Test:     nginx -t && systemctl reload nginx
#
# REPLACE: yourdomain.com with your actual domain before enabling.

# Rate limiting — 30 req/s per IP, burst 60
limit_req_zone $binary_remote_addr zone=jarvis_limit:10m rate=30r/s;

# Upstream — single backend process on port 5050
upstream jarvis_backend {
    server 127.0.0.1:5050;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by Certbot (will be added automatically)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hide server version
    server_tokens off;

    # Request size limit (10 MB matches backend)
    client_max_body_size 10m;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Webhook endpoints — no rate limit, Razorpay/Meta need direct access ──
    location ~ ^/(webhook|whatsapp/webhook) {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API endpoints — rate limited ──────────────────────────────────────
    location /jarvis {
        limit_req zone=jarvis_limit burst=20 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other routes (API + frontend static) ──────────────────────────
    location / {
        limit_req zone=jarvis_limit burst=60 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static frontend assets
        location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
            proxy_pass         http://jarvis_backend;
            proxy_cache_bypass $http_upgrade;
            expires            7d;
            add_header         Cache-Control "public, immutable";
        }
    }

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
}
