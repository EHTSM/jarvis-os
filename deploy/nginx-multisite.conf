# JARVIS OS — Multi-site nginx config
# Covers:
#   ooplix.com         → public landing page (React SPA, same build)
#   app.ooplix.com     → SaaS web app (React SPA, same build — domain flag gates landing)
#   api.ooplix.com     → backend API only (no static files)
#
# Deployment model:
#   - One VPS running the Node.js backend on port 5050
#   - One nginx instance handling all three vhosts
#   - Same frontend build served for both ooplix.com and app.ooplix.com
#     (App.jsx detects hostname and routes accordingly — no separate build needed)
#
# Setup:
#   ln -s /etc/nginx/sites-available/jarvis-multisite /etc/nginx/sites-enabled/
#   certbot --nginx -d ooplix.com -d www.ooplix.com -d app.ooplix.com -d api.ooplix.com
#   nginx -t && systemctl reload nginx

limit_req_zone $binary_remote_addr zone=jarvis_api:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=jarvis_auth:10m   rate=5r/s;
limit_req_zone $binary_remote_addr zone=jarvis_public:10m rate=60r/s;

upstream jarvis_backend {
    server 127.0.0.1:5050;
    keepalive 8;
}

# ── HTTP → HTTPS redirect (all domains) ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ooplix.com www.ooplix.com app.ooplix.com api.ooplix.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# ── ooplix.com — Public landing page ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ooplix.com www.ooplix.com;

    ssl_certificate     /etc/letsencrypt/live/ooplix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ooplix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Public site + Firebase Auth (Google Sign-In popup, Phone OTP reCAPTCHA)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.recaptcha.net https://www.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com; frame-src https://ooplix-jarvis.firebaseapp.com https://www.google.com https://www.recaptcha.net; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    root /var/www/jarvis/frontend/build;

    location ~* ^/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(ico|png|jpg|svg|woff2?|ttf|eot|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback — React handles routing client-side
    location / {
        limit_req zone=jarvis_public burst=100 nodelay;
        try_files $uri $uri/ /index.html;
    }
}

# ── app.ooplix.com — SaaS web app ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ooplix.com;

    ssl_certificate     /etc/letsencrypt/live/ooplix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ooplix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # SaaS app: same-origin + Firebase Auth (Google Sign-In popup, Phone OTP reCAPTCHA)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.recaptcha.net https://www.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://app.ooplix.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com; frame-src https://ooplix-jarvis.firebaseapp.com https://www.google.com https://www.recaptcha.net; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;
    client_max_body_size 10m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/html application/json application/javascript text/css;
    gzip_min_length 1000;

    root /var/www/jarvis/frontend/build;

    location ~* ^/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Webhooks — no rate limit (Razorpay + Meta)
    location ~ ^/(webhook|whatsapp/webhook) {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE stream — buffering must be off
    location /runtime/stream {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Runtime API (auth-gated)
    location ^~ /runtime {
        limit_req zone=jarvis_api burst=20 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # Auth routes (stricter rate limit)
    location ^~ /auth {
        limit_req zone=jarvis_auth burst=5 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # All other API routes
    location ~ ^/(jarvis|health|ops|stats|crm|payment|ai|send-followup|simulate|evolution|metrics) {
        limit_req zone=jarvis_api burst=20 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # SPA fallback
    location / {
        limit_req zone=jarvis_public burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }
}

# ── api.ooplix.com — Backend API (no static files) ───────────────────────────
# Use this vhost if you want a dedicated API subdomain that the Electron app
# or mobile app can hit directly, independent of the web frontend domain.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ooplix.com;

    ssl_certificate     /etc/letsencrypt/live/ooplix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ooplix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    server_tokens off;
    client_max_body_size 10m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    3600s;

    # All requests → backend
    location /runtime/stream {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location ^~ /auth {
        limit_req zone=jarvis_auth burst=5 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    location / {
        limit_req zone=jarvis_api burst=30 nodelay;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }
}
