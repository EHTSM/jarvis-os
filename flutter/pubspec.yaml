name: jarvis_mobile
description: JARVIS Engineering — Flutter mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1

  # HTTP / API
  http: ^1.2.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
