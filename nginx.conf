# JARVIS-OS Production Nginx Configuration
# Tested with nginx 1.18+
# Place at: /etc/nginx/sites-available/jarvis-os
# Symlink:  sudo ln -s /etc/nginx/sites-available/jarvis-os /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zones ──────────────────────────────────────────────────────
# limit_req_zone defines shared memory zones for rate limiting (DDoS protection)
limit_req_zone $binary_remote_addr zone=api_global:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_jarvis:10m  rate=30r/m;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream jarvis_backend {
    server 127.0.0.1:5050;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.ooplix.com ooplix.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ooplix.com ooplix.com;

    # ── TLS (replace with real cert paths from certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.ooplix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ooplix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # ── Security headers (belt-and-suspenders with Express) ───────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Static frontend ───────────────────────────────────────────────────────
    root /opt/jarvis-os/frontend/build;
    index index.html;

    # ── Auth routes — strict rate limit (brute force protection) ─────────────
    location /auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://jarvis_backend;
        include /etc/nginx/proxy_params;
    }

    # ── Jarvis AI route — moderate limit ─────────────────────────────────────
    location /jarvis {
        limit_req zone=api_jarvis burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://jarvis_backend;
        include /etc/nginx/proxy_params;
    }

    # ── API / backend — global limit ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://jarvis_backend;
        include /etc/nginx/proxy_params;
    }

    # ── All other backend routes ───────────────────────────────────────────────
    location ~ ^/(p[0-9]+|runtime|browser|oauth|billing|crm|tasks|ops|health|metrics|webhook|telegram|whatsapp|payment|accounts|settings|simulate|ai|search|deploy|secrets|obs) {
        limit_req zone=api_global burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://jarvis_backend;
        include /etc/nginx/proxy_params;
    }

    # ── SSE streaming (runtime stream) — disable buffering ────────────────────
    location /runtime/stream {
        proxy_pass http://jarvis_backend;
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       3600s;
        proxy_set_header Connection "";
        include /etc/nginx/proxy_params;
    }

    # ── SPA fallback — all other paths serve index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    client_max_body_size 10m;
}
