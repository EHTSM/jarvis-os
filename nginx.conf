# ═══════════════════════════════════════════════════════════════════════════
# Ooplix (JARVIS OS) — Production Nginx Configuration
# Place at:  /etc/nginx/sites-available/ooplix
# Enable:    sudo ln -s /etc/nginx/sites-available/ooplix /etc/nginx/sites-enabled/
# Test:      sudo nginx -t
# Reload:    sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════

# ── Rate-limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_jarvis:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_broad:10m  rate=120r/m;

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream jarvis_backend {
    server 127.0.0.1:5050;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.ooplix.com ooplix.com www.ooplix.com;

    # ACME challenge for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ooplix.com ooplix.com www.ooplix.com;

    # ── TLS (certbot populates these via https-setup.sh) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.ooplix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.ooplix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # Firebase Auth, GTM, GA4, Clarity
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://www.googleapis.com https://www.googletagmanager.com https://www.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://www.clarity.ms; frame-src https://ooplix-jarvis.firebaseapp.com https://www.google.com; frame-ancestors 'none';" always;
    server_tokens off;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── Limits ────────────────────────────────────────────────────────────────
    client_max_body_size 10m;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Static frontend — served directly by nginx ────────────────────────────
    root /opt/jarvis-os/frontend/build;
    index index.html;

    # Hashed JS/CSS bundles — immutable cache (CRA appends content hash)
    location ~* ^/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static assets
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ── Webhooks — no rate limit (Razorpay + Meta require unthrottled access) ─
    location ~ ^/(webhook|whatsapp/webhook|razorpay-webhook) {
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SSE streaming — buffering off or events never arrive ─────────────────
    location /runtime/stream {
        proxy_pass              http://jarvis_backend;
        proxy_http_version      1.1;
        proxy_set_header        Connection        "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Cookie            $http_cookie;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        chunked_transfer_encoding on;
    }

    # ── Auth routes — strict rate limit (brute-force protection) ─────────────
    # Both /auth/* and /api/auth/* proxy to the backend; Express handles both
    # because server.js mounts routes at both / and /api.
    location ^~ /api/auth {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /auth {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Jarvis AI route — moderate limit ─────────────────────────────────────
    location ^~ /jarvis {
        limit_req zone=api_jarvis burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All API routes — proxied to Express ──────────────────────────────────
    # Single-line regex: nginx does not support inline comments inside location regex patterns.
    location ~ ^/(api|accounts|settings|billing|metrics|ai|crm|crm-leads|payment|whatsapp|telegram|send-followup|simulate|health|ops|stats|test|runtime|agents|lifecycle|tasks|browser|p18|p19|p20|p21|p22|p23|p24|p25|p26|p27|workspace|oauth|intelligence|engineering|business|orgs|workforce|graph|collaboration|collab|pipeline|deployment|security|admin|governance|automation|coding|composer|autonomous|repo-viz|memory|improvement|platform|analytics|plugins|marketplace|extensions|commercial|ai-ecosystem|browser-platform|creative|launch|fop|growth|plan|mission|search|deploy|secrets|obs|evolution|wiring|wiring2|credentials|ext|dop|dop2|co2|co3|op1|revenue|distrib|content) {
        limit_req zone=api_broad burst=40 nodelay;
        limit_req_status 429;
        proxy_pass         http://jarvis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback — React Router client-side routing ───────────────────────
    location / {
        limit_req zone=api_broad burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\.(git|env|htaccess|env\.example|DS_Store) {
        deny all;
        return 404;
    }
}
