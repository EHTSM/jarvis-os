<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 116 40" fill="none">
  <defs>
    <linearGradient id="grad-d3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <filter id="glow-d3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Mark: Operator O ── -->
  <!-- Heavy O ring — authoritative, precise -->
  <circle cx="20" cy="20" r="12"
    stroke="url(#grad-d3)"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
    filter="url(#glow-d3)"/>

  <!-- Center operator dot — the focus point, the kernel -->
  <circle cx="20" cy="20" r="3.5"
    fill="url(#grad-d3)"
    filter="url(#glow-d3)"/>

  <!--
    Crosshair lines — very subtle, 20% opacity.
    Creates the scope/reticle reading without dominating.
  -->
  <line x1="20" y1="6"  x2="20" y2="11"
    stroke="url(#grad-d3)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="20" y1="29" x2="20" y2="34"
    stroke="url(#grad-d3)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="6"  y1="20" x2="11" y2="20"
    stroke="url(#grad-d3)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="29" y1="20" x2="34" y2="20"
    stroke="url(#grad-d3)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

  <!-- ── Wordmark: ooplix (lowercase mono weight) ── -->
  <text
    x="44" y="25"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="17"
    font-weight="600"
    letter-spacing="0.04em"
    fill="#dde2ec">
    ooplix
  </text>
</svg>
