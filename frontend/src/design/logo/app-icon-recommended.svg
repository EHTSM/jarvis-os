<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!--
    App icon artboard: 1024×1024
    Background: --os-void #03050a with rounded corners (Apple icon grid)
    Mark: Direction 3 (Operator) scaled to fill icon artboard
    Used for: macOS .icns, iOS .png exports, Android adaptive icon foreground
  -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <radialGradient id="bg-ambient" cx="30%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#03050a"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg-ambient)"/>

  <!-- Subtle ambient violet at top-left -->
  <circle cx="200" cy="200" r="300" fill="rgba(124,111,255,0.06)"/>

  <!-- O ring: center (512,512), r=280, stroke 80px -->
  <circle cx="512" cy="512" r="280"
    stroke="url(#g)"
    stroke-width="80"
    fill="none"
    filter="url(#glow)"/>

  <!-- Center operator dot: r=72 -->
  <circle cx="512" cy="512" r="72"
    fill="url(#g)"
    filter="url(#glow)"/>

  <!-- Crosshair ticks: subtle, opacity 0.28 -->
  <line x1="512" y1="140" x2="512" y2="230" stroke="url(#g)" stroke-width="28" stroke-linecap="round" opacity="0.28"/>
  <line x1="512" y1="794" x2="512" y2="884" stroke="url(#g)" stroke-width="28" stroke-linecap="round" opacity="0.28"/>
  <line x1="140" y1="512" x2="230" y2="512" stroke="url(#g)" stroke-width="28" stroke-linecap="round" opacity="0.28"/>
  <line x1="794" y1="512" x2="884" y2="512" stroke="url(#g)" stroke-width="28" stroke-linecap="round" opacity="0.28"/>
</svg>
