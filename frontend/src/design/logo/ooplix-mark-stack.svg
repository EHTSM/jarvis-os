<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!--
    Ooplix Mark — The Stack
    Three bars: a task queue. The middle bar has a gap with an active dot.
    Reading: queued → RUNNING → queued. The OS in mid-execution.

    Construction:
      Bar 1 (top):    full width 22px, y=12, h=3.5, rx=1.75 — dim (queued)
      Bar 2 (middle): left segment 8px + gap 6px + right segment 8px — running
                      active dot at gap center: (20, 20)
      Bar 3 (bottom): width 14px (shorter, fading queue), y=26, h=3.5, rx=1.75 — dim (queued)
    Colors:
      Top/bottom bars: --text-faint (rgba(255,255,255,0.22))
      Middle segments + dot: gradient violet→teal
  -->
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <filter id="sdot-glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bar 1: top, full, queued (dim) -->
  <rect x="9" y="12" width="22" height="3.5" rx="1.75"
    fill="rgba(255,255,255,0.18)"/>

  <!-- Bar 2 left segment: running (gradient) -->
  <rect x="9" y="18.25" width="8" height="3.5" rx="1.75"
    fill="url(#sg)"/>

  <!-- Bar 2 right segment: running (gradient) -->
  <rect x="23" y="18.25" width="8" height="3.5" rx="1.75"
    fill="url(#sg)"/>

  <!-- Active process dot — sits in the gap, slightly larger -->
  <circle cx="20" cy="20" r="3.8"
    fill="#7c6fff"
    filter="url(#sdot-glow)"/>
  <circle cx="20" cy="20" r="2"
    fill="#4ecdc4"/>

  <!-- Bar 3: bottom, shorter, queued (more dim = further in future queue) -->
  <rect x="9" y="24.5" width="14" height="3.5" rx="1.75"
    fill="rgba(255,255,255,0.10)"/>
</svg>
