<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cl"><circle cx="13" cy="16" r="8"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#07090f"/>

  <!-- Left circle: violet -->
  <circle cx="13" cy="16" r="7" stroke="#7c6fff" stroke-width="2" fill="none" filter="url(#glow)"/>

  <!-- Right circle: teal -->
  <circle cx="20" cy="16" r="7" stroke="#4ecdc4" stroke-width="2" fill="none" filter="url(#glow)"/>

  <!-- Overlap fill -->
  <g clip-path="url(#cl)">
    <circle cx="20" cy="16" r="7" fill="url(#g)" opacity="0.30"/>
  </g>

  <!-- Center kernel dot -->
  <circle cx="16.5" cy="16" r="2" fill="url(#g)" opacity="0.9"/>
</svg>
