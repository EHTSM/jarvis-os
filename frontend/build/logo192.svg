<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!--
    Ooplix Mark — OVERRIDE geometry @ 192×192
    16px padding each side. Background rx:28.
    Thick bar: y=72 h=28 x=16 w=160
    Thin bar: y=116 h=14 x=49 w=115 (right-aligned: 16+160=176, 176-115=61? → use spec: x=49 w=115 → right edge=164, inner right=176 → not flush, using spec exactly)
    Gap check: 28 + (116-72-28) = 28 + 16 = 44 gap → gap ratio = 16/28 = 0.57 (scaled proportionally for larger canvas)
  -->
  <rect width="192" height="192" rx="28" fill="#03050a"/>
  <!-- Thick bar -->
  <rect x="16" y="72" width="160" height="28" rx="2" fill="#ffffff"/>
  <!-- Thin bar: right-aligned within inner box (x=16 to x=176), w=115 → x=61 for true right-align, spec says x=49 -->
  <rect x="49" y="116" width="115" height="14" rx="2" fill="#ffffff"/>
</svg>
