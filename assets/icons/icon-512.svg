<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="512" rx="114" fill="none" stroke="url(#g)" stroke-width="4" opacity="0.2"/>
  <g transform="translate(256, 256)" fill="none" stroke="url(#g)">
    <!-- Outer hexagon -->
    <polygon points="0,-128 110.9,-64 110.9,64 0,128 -110.9,64 -110.9,-64"
             stroke-width="3" opacity="0.2"/>
    <!-- Mid hexagon -->
    <polygon points="0,-88 76.2,-44 76.2,44 0,88 -76.2,44 -76.2,-44"
             stroke-width="3" opacity="0.4"/>
    <!-- Inner hexagon -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"
             stroke-width="3" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="18" fill="url(#g)" stroke="none" opacity="0.95"/>
    <!-- Connector lines: inner to mid -->
    <line x1="0" y1="-52" x2="0" y2="-88" stroke-width="2.5" opacity="0.55"/>
    <line x1="45" y1="26" x2="76.2" y2="44" stroke-width="2.5" opacity="0.55"/>
    <line x1="-45" y1="26" x2="-76.2" y2="44" stroke-width="2.5" opacity="0.55"/>
    <!-- Connector lines: mid to outer -->
    <line x1="0" y1="-88" x2="0" y2="-128" stroke-width="2" opacity="0.3"/>
    <line x1="76.2" y1="44" x2="110.9" y2="64" stroke-width="2" opacity="0.3"/>
    <line x1="-76.2" y1="44" x2="-110.9" y2="64" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
