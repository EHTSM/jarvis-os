<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="#0a0a0f"/>
  <rect x="0" y="8" width="64" height="64" rx="14" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.4"/>
  <!-- Hexagon grid pattern (AI OS symbol) -->
  <g transform="translate(32, 40)" fill="none" stroke="url(#logoGrad)" stroke-width="1.5">
    <polygon points="0,-16 13.9,-8 13.9,8 0,16 -13.9,8 -13.9,-8" opacity="0.3"/>
    <polygon points="0,-9 7.8,-4.5 7.8,4.5 0,9 -7.8,4.5 -7.8,-4.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="3.5" fill="url(#logoGrad)" opacity="0.9"/>
    <!-- Cross connectors -->
    <line x1="0" y1="-9" x2="0" y2="-16" opacity="0.5"/>
    <line x1="7.8" y1="4.5" x2="13.9" y2="8" opacity="0.5"/>
    <line x1="-7.8" y1="4.5" x2="-13.9" y2="8" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="46" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
        font-size="28" font-weight="700" fill="url(#logoGrad)" letter-spacing="-0.5">
    Ooplix
  </text>
  <!-- Tagline -->
  <text x="83" y="63" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" font-weight="400" fill="#888" letter-spacing="0.5">
    AI OPERATING SYSTEM
  </text>
</svg>
