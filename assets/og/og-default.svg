<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="gText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Brand mark (centered left) -->
  <g transform="translate(120, 315)">
    <g fill="none" stroke="url(#g)">
      <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36" stroke-width="2" opacity="0.2"/>
      <polygon points="0,-48 41.6,-24 41.6,24 0,48 -41.6,24 -41.6,-24" stroke-width="2.5" opacity="0.45"/>
      <polygon points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14" stroke-width="2.5" opacity="0.8"/>
      <circle cx="0" cy="0" r="10" fill="url(#g)" stroke="none"/>
      <line x1="0" y1="-28" x2="0" y2="-48" stroke-width="2" opacity="0.6"/>
      <line x1="24.2" y1="14" x2="41.6" y2="24" stroke-width="2" opacity="0.6"/>
      <line x1="-24.2" y1="14" x2="-41.6" y2="24" stroke-width="2" opacity="0.6"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="260" y="290" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
        font-size="88" font-weight="700" fill="url(#gText)" letter-spacing="-2">
    Ooplix
  </text>

  <!-- Tagline -->
  <text x="262" y="352" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="24" font-weight="400" fill="#888" letter-spacing="3">
    AI OPERATING SYSTEM FOR SOLO FOUNDERS
  </text>

  <!-- Feature pills -->
  <g transform="translate(262, 400)">
    <rect x="0" y="0" width="130" height="34" rx="17" fill="#1a1a2e" stroke="#7c6fff" stroke-width="1" opacity="0.8"/>
    <text x="65" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#7c6fff" text-anchor="middle">Mission Control</text>

    <rect x="146" y="0" width="80" height="34" rx="17" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1" opacity="0.8"/>
    <text x="186" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#4ecdc4" text-anchor="middle">CRM</text>

    <rect x="242" y="0" width="110" height="34" rx="17" fill="#1a1a2e" stroke="#7c6fff" stroke-width="1" opacity="0.8"/>
    <text x="297" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#7c6fff" text-anchor="middle">Growth OS</text>

    <rect x="368" y="0" width="130" height="34" rx="17" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1" opacity="0.8"/>
    <text x="433" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#4ecdc4" text-anchor="middle">AI Dev Workspace</text>
  </g>

  <!-- Domain -->
  <text x="600" y="580" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="18" fill="#555" text-anchor="middle" letter-spacing="1">
    ooplix.com
  </text>

  <!-- Border accent -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.12"/>
</svg>
